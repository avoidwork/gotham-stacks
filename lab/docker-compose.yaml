version: "3.8"

services:
  # --------------------------------------------------------------
  # Datastores (DB/Cache)
  # --------------------------------------------------------------

  # --------------------------------------------------------------
  # MySQL
  # --------------------------------------------------------------
  mysql:
    image: mysql:9.7.0
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_NPM_PASSWORD=${MYSQL_NPM_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./mysqld.cnf:/etc/mysql/mysql.conf.d/mysqld.cnf:ro
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 1G
        limits:
          cpus: "1"
          memory: 4G
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  # --------------------------------------------------------------
  # MongoDB
  # --------------------------------------------------------------
  mongodb:
    image: mongo:8.2.7-noble
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 512M
        limits:
          cpus: "1"
          memory: 2G

  # --------------------------------------------------------------
  # Redis
  # --------------------------------------------------------------
  redis:
    image: redis:8.6.2-alpine
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - /mnt/docker/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 1G
        limits:
          cpus: "1"
          memory: 4G

  # --------------------------------------------------------------
  # Platform apps
  # --------------------------------------------------------------

  # --------------------------------------------------------------
  # nginx
  # --------------------------------------------------------------
  nginx:
    image: nginx:1.30.0-alpine
    pull_policy: if_not_present
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - /mnt/docker/nginx/conf.d:/etc/nginx/conf.d
      - /mnt/docker/nginx/wwwroot:/usr/share/nginx
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 512M
        limits:
          cpus: "2"
          memory: 2G

  # --------------------------------------------------------------
  # SearXNG
  # --------------------------------------------------------------
  searxng:
    image: searxng/searxng:2026.4.24-a7ac696b4
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - CONFIG_PATH=/etc/searxng
      - DATA_PATH=/var/cache/searxng
      - SEARXNG_PORT=8080
      - SEARXNG_BASE_URL=https://searxng.avoidwork.com
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    volumes:
      - /mnt/docker/searxng/config:/etc/searxng
      - /mnt/docker/searxng/data:/var/cache/searxng
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 1G
        limits:
          cpus: "2"
          memory: 4G

  # --------------------------------------------------------------
  # Open WebUI
  # --------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - OPENAI_API_BASE_URL=http://10.1.2.60:8000/v1
    volumes:
      - /mnt/docker/open-webui:/app/backend/data
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 512M
        limits:
          cpus: "1"
          memory: 2G

  # --------------------------------------------------------------
  # n8n
  # --------------------------------------------------------------
  n8n:
    image: n8nio/n8n:2.18.3-amd64
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "5678:5678"
    user: "0:0"
    environment:
      - NODES_EXCLUDE=[]
      - N8N_RESTRICT_FILE_ACCESS_TO=/mnt/translate
      - GENERIC_TIMEZONE=America/Toronto
      - TZ=America/Toronto
      - HOME=/home/node
      - N8N_USER_FOLDER=/home/node/.n8n
    volumes:
      - /mnt/docker/n8n:/home/node/.n8n
      - /mnt/translate:/mnt/translate
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 512M
        limits:
          cpus: "1"
          memory: 2G

  # --------------------------------------------------------------
  # TeamCity
  # --------------------------------------------------------------
  teamcity:
    image: jetbrains/teamcity-server:2025.11.4
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "8111:8111"
    environment:
      - TEAMCITY_ENV=container
      - TZ=America/Toronto
      - TEAMCITY_DB_PASSWORD=${TEAMCITY_DB_PASSWORD}
      - TEAMCITY_DB_URL=jdbc:mysql://mysql:3306/teamcity
      - TEAMCITY_DB_USER=teamcity
    volumes:
      - /mnt/docker/teamcity/logs:/opt/teamcity/logs
      - /mnt/docker/teamcity/temp:/opt/teamcity/temp
      - /mnt/docker/teamcity/data:/data/teamcity_server/datadir
    depends_on:
      - mysql
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 1G
        limits:
          cpus: "1"
          memory: 4G

  # --------------------------------------------------------------
  # Nginx Proxy Manager
  # --------------------------------------------------------------
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.14.0
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    environment:
      - TZ=America/Toronto
      - DB_MYSQL_HOST=mysql
      - DB_MYSQL_PORT=3306
      - DB_MYSQL_USER=npm
      - DB_MYSQL_PASSWORD=${MYSQL_NPM_PASSWORD}
      - DB_MYSQL_NAME=npm
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    depends_on:
      - mysql
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 512M
        limits:
          cpus: "2"
          memory: 2G

  # --------------------------------------------------------------
  # Monitoring
  # --------------------------------------------------------------

  # --------------------------------------------------------------
  # Grafana
  # --------------------------------------------------------------
  grafana:
    image: grafana/grafana:13.1.0-24866141508
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - GF_PLUGINS_PREINSTALL=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 512M
        limits:
          cpus: "1"
          memory: 4G

  # --------------------------------------------------------------
  # InfluxDB
  # --------------------------------------------------------------
  influxdb:
    image: influxdb:2.8.0
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_USERNAME=jason
      - DOCKER_INFLUXDB_INIT_PASSWORD=${DOCKER_INFLUXDB_INIT_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=proxmox
      - DOCKER_INFLUXDB_INIT_BUCKET=proxmox
      - DOCKER_INFLUXDB_INIT_MODE=setup
    volumes:
      - /mnt/docker/influxdb/config:/etc/influxdb2
      - /mnt/docker/influxdb/data:/var/lib/influxdb2
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 256M
        limits:
          cpus: "0.5"
          memory: 1G

  # --------------------------------------------------------------
  # Prometheus
  # --------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.11.2
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - /mnt/docker/prometheus/config:/etc/prometheus
      - /mnt/docker/prometheus/data:/prometheus
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 256M
        limits:
          cpus: "1"
          memory: 512M

  # --------------------------------------------------------------
  # Utilities / exporters
  # --------------------------------------------------------------

  # --------------------------------------------------------------
  # Pi-hole exporter 1
  # --------------------------------------------------------------
  pihole-exporter-1:
    image: ekofr/pihole-exporter:v1.2.0
    pull_policy: if_not_present
    restart: unless-stopped
    environment:
      - PIHOLE_HOSTNAME=10.1.2.2
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 128M
        limits:
          cpus: "0.25"
          memory: 256M

  # --------------------------------------------------------------
  # Pi-hole exporter 2
  # --------------------------------------------------------------
  pihole-exporter-2:
    image: ekofr/pihole-exporter:v1.2.0
    pull_policy: if_not_present
    restart: unless-stopped
    environment:
      - PIHOLE_HOSTNAME=10.1.2.3
      - PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
    deploy:
      resources:
        reservations:
          cpus: "0.1"
          memory: 128M
        limits:
          cpus: "0.25"
          memory: 256M

  # --------------------------------------------------------------
  # OpenClaw
  # --------------------------------------------------------------
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.4.22
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "18789:18789"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENAI_BASE_URL=http://10.1.2.60:8000/v1
      - OPENAI_API_KEY=local
      - SEARXNG_BASE_URL=http://searxng:8080
      - LIDARR_BASE_URL=http://host.docker.internal:8686
      - RADARR_BASE_URL=http://host.docker.internal:7878
      - SONARR_BASE_URL=http://host.docker.internal:8989
      - OPENCODE_HOST=10.1.2.8
      - ZOHO_EMAIL=${ZOHO_EMAIL}
      - ZOHO_PASSWORD=${ZOHO_PASSWORD}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - LIDARR_API_KEY=${LIDARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - NZBPLANET_API_KEY=${NZBPLANET_API_KEY}
      - OPENCODE_USERNAME=${OPENCODE_USERNAME}
      - OPENCODE_PASSWORD=${OPENCODE_PASSWORD}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_API_ACCESS_TOKEN=${TMDB_API_ACCESS_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/docker/openclaw:/home/node/.openclaw
    deploy:
      resources:
        reservations:
          cpus: "0.5"
          memory: 4G
        limits:
          cpus: "4"
          memory: 8G

volumes:
  mysql-data:
  mongodb-data:
  npm-data:
  npm-letsencrypt:
  grafana-data:

